name: CMake Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt 6
      run: sudo apt-get update && sudo apt-get install -y qt6-base-dev libqt6svg6

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build
